name: Slack Notify

on:
  workflow_dispatch: # 수동 실행용 (스케줄은 cron-job.org로 이관)
    inputs:
      type:
        description: "알림 유형 (weekly | reminder)"
        required: true
        default: "weekly"

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Determine notification type
        id: type
        run: |
          if [ -n "${{ github.event.inputs.type }}" ]; then
            echo "value=${{ github.event.inputs.type }}" >> $GITHUB_OUTPUT
          elif [ "$(date -u +%u)" = "1" ] && [ "$(date -u +%H)" = "01" ]; then
            echo "value=weekly" >> $GITHUB_OUTPUT
          else
            echo "value=reminder" >> $GITHUB_OUTPUT
          fi

      - name: Send Slack notification
        run: |
          TYPE="${{ steps.type.outputs.value }}"

          response=$(curl -s -w "\n%{http_code}" -X POST \
            "${{ secrets.APP_URL }}/api/cron/slack-notify?type=${TYPE}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json")

          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -n -1)

          echo "Type: $TYPE"
          echo "Status: $http_code"
          echo "Response: $body"

          if [ "$http_code" -ne 200 ]; then
            echo "::error::Slack notify failed with status $http_code"
            exit 1
          fi
