name: Random Lunch Match

on:
  schedule:
    # 평일 30분마다 KST 08:00~12:30 = UTC 23:00~03:30
    # UTC 23:00, 23:30 (전날) + 00:00~03:30 (당일)
    - cron: "0,30 23 * * 0-4"
    - cron: "0,30 0-3 * * 1-5"
  workflow_dispatch: # 수동 실행 가능

jobs:
  trigger-match:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger match API
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST \
            "${{ secrets.APP_URL }}/api/cron/match" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json")

          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -n -1)

          echo "Status: $http_code"
          echo "Response: $body"

          if [ "$http_code" -ne 200 ]; then
            echo "::error::Match API failed with status $http_code"
            exit 1
          fi
